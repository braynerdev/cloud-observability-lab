services:
  cloud-lab-guide:
    image: ghcr.io/braynerdev/cloud-lab-guide:latest
    ports:
      - target: 3004
        published: 3004
        protocol: tcp
        mode: host
    environment:
      NODE_ENV: production
      PORT: "3004"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: start-first
